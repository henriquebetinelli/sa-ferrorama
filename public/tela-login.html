<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/style/style.css">
    <title>Login - Click Rails</title>
</head>

<body>
    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-imagem">
                <img src="../assets/img/reutilizaveis/trem_estacionado.jpg" alt="Estação ferroviária" />
            </div>
            <div class="login-formulario">
                <a href="index.html" class="login-voltar">Voltar</a>
                <h1><strong>Login</strong></h1>

                <div id="alerta-erro" class="login-alerta d-none">
                    <span>&#9432;</span>
                    <p>Usuário não encontrado!</p>
                </div>

                <div class="login-campo">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your Email here..." />
                </div>

                <div class="login-campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Enter your Password here..." />
                </div>

                <button class="btn botao-azul-escuro w-100">Entrar</button>
            </div>
        </div>
    </main>
</body>
</html>
